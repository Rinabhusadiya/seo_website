<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - My Website</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#555;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:yellow;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.form-box{
    background:white;
    padding:25px;
    width:350px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.form-box h2{
    text-align:center;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

input:focus, textarea:focus{
    border-color:#333;
}

button{
    width:100%;
    padding:12px;
    background:#333;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#555;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:10px;
}
</style>

</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<nav>
    <a href="seohome.html">Home</a>
    <a href="seoabout.html">About</a>
    <a href="seoblog.html">Blog</a>
    <a href="seocontact.html">Contact</a>
</nav>

<div class="container">

<div class="form-box">
<h2>Get in Touch</h2>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<input type="tel" placeholder="Mobile Number">
<textarea rows="4" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>
</form>

</div>

</div>

<footer>
<p>© 2026 My Website</p>
</footer>

</body>
</html>
